version: '3.8'

services:
  # ==========================================
  # 1. KEYCLOAK ENVIRONMENT
  # ==========================================
  postgres-keycloak:
    image: postgres:15-alpine
    container_name: postgres-keycloak
    environment:
      POSTGRES_DB: ${KC_DB_NAME}
      POSTGRES_USER: ${KC_DB_USER}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - oidc-network
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/${KC_DB_NAME}
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: localhost # Ubah jika di-deploy ke server dengan IP/Domain khusus
    ports:
      - "8080:8080"
    depends_on:
      - postgres-keycloak
    networks:
      - oidc-network

  # ==========================================
  # 2. ORY HYDRA ENVIRONMENT
  # ==========================================
  postgres-hydra:
    image: postgres:15-alpine
    container_name: postgres-hydra
    environment:
      POSTGRES_DB: ${HYDRA_DB_NAME}
      POSTGRES_USER: ${HYDRA_DB_USER}
      POSTGRES_PASSWORD: ${HYDRA_DB_PASSWORD}
    volumes:
      - hydra_db_data:/var/lib/postgresql/data
    networks:
      - oidc-network
    restart: unless-stopped

  hydra-migrate:
    image: oryd/hydra:v2.2.0
    container_name: hydra-migrate
    environment:
      - DSN=${HYDRA_DSN}
    command: migrate sql -e --yes
    depends_on:
      - postgres-hydra
    networks:
      - oidc-network

  hydra:
    image: oryd/hydra:v2.2.0
    container_name: hydra
    ports:
      - "4444:4444" # Public API (untuk aplikasi web/client)
      - "4445:4445" # Admin API (untuk internal management, jangan di-expose ke publik di production)
    environment:
      - DSN=${HYDRA_DSN}
      - SECRETS_SYSTEM=${HYDRA_SECRETS_SYSTEM}
      - SECRETS_COOKIE=${HYDRA_SECRETS_COOKIE}
      - URLS_SELF_ISSUER=http://localhost:4444
      - URLS_CONSENT=http://localhost:3000/consent
      - URLS_LOGIN=http://localhost:3000/login
      - SERVE_PUBLIC_CORS_ENABLED=true
      - SERVE_PUBLIC_CORS_ALLOWED_ORIGINS=*
    command: serve all --dev
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    networks:
      - oidc-network

  # Provider UI bawaan Hydra (untuk User Login & Consent)
  consent-ui:
    image: oryd/hydra-login-consent-node:v2.2.0
    container_name: consent-ui
    ports:
      - "3000:3000"
    environment:
      - HYDRA_ADMIN_URL=http://hydra:4445
    networks:
      - oidc-network
    depends_on:
      - hydra

networks:
  oidc-network:
    driver: bridge

volumes:
  keycloak_db_data:
  hydra_db_data: